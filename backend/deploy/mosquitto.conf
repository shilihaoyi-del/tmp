# Mosquitto config for SC171V2 arm control system
# Ports: 1883 (MQTT TCP), 9001 (MQTT over WebSocket for future web UI)

listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /var/lib/mosquitto/
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Keepalive / connection
max_keepalive 60
connection_messages true
